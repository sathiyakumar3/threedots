<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskbz</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="https://unpkg.com/vanilla-calendar-pro@3.1.0/styles/layout.css">
  <link rel="stylesheet" href="https://unpkg.com/vanilla-calendar-pro@3.1.0/styles/themes/light.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.css">
  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <link rel="stylesheet" href="css/styles.css?v=7">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<body>

  <div class="app-shell" id="appShell">

    <div class="app-content">
      <div class="project-info">
        <!-- Left group -->
        <div class="topbar-left">
          <div class="topbar-logo">
            <img class="logo-mode-light" src="images/logo-light.svg" width="160" height="42" alt="Taskbz logo">
            <img class="logo-mode-dark"  src="images/logo-dark.svg"  width="160" height="42" alt="Taskbz logo">
          </div>
          <div class="board-title-wrap">
            <div class="board-combo" id="boardCombo">
              <button class="board-combo__trigger" id="boardComboTrigger">
                <span id="boardComboLabel">Select board</span>
                <i class="fas fa-star board-combo__fav-star" id="boardFavStar"></i>
                <i class="fas fa-chevron-down board-combo__chevron"></i>
              </button>

                <div id="boardComboList"></div>

                  <button class="board-combo__new-add" id="boardComboNewAdd" title="Add board"><i class="fas fa-plus"></i></button>
                </div>
              </div>
            </div>
          </div>
          <div class="board-options-wrap">
            <button class="project-column-heading__options" id="boardOptionsBtn" title="Board options"><i class="fas fa-ellipsis-h"></i></button>
            <div class="board-dropdown" id="boardDropdown">
              <button id="boardOptFavourite"><i class="fas fa-star"></i> <span id="boardOptFavouriteLabel">Make favourite</span></button>
              <div class="board-dropdown__divider"></div>
              <button id="boardOptRename"><i class="fas fa-pen"></i> Rename board</button>
              <button id="boardOptDelete" class="danger"><i class="fas fa-trash-alt"></i> Delete board</button>
              <div class="board-dropdown__divider" id="boardOptLeaveDivider"></div>
              <button id="boardOptLeave" class="danger"><i class="fas fa-sign-out-alt"></i> Leave board</button>
            </div>
          </div>
       
          <div class="tags-wrap" id="tagsWrap">
            <button class="tags-btn" id="tagsBtn" title="Tags"><i class="fas fa-tag"></i></button>
            <div class="tags-popup" id="tagsPopup">
              <div class="tags-popup__title">
                Tags
                <button type="button" class="tags-themes__icon-btn" id="tagsThemesToggle" title="Color Themes">
                  <i class="fas fa-palette"></i>
                </button>
              </div>
              <div class="tags-list" id="tagsPopupList"></div>
              <div class="tags-popup__footer">
                <div class="tags-popup__new-row">
                  <input type="text" class="tags-new-input" id="tagsNewInput" placeholder="New tag name…" autocomplete="off">
                  <button class="tags-new-add" id="tagsNewAdd" title="Add tag"><i class="fas fa-plus"></i></button>
                </div>
              </div>
              <div class="tags-themes" id="tagsThemesPanel">
                <div class="tags-themes__title">Color Themes</div>
                <div class="tags-themes__list" id="tagsThemesList"></div>
              </div>
            </div>
          </div>
          <div class="topbar-divider"></div>
                    <div class="project-participants" id="projectParticipants">
            <!-- avatars injected by renderParticipants() -->
            <button class="project-participants__add" id="addParticipantBtn" title="Manage team">
              <i class="fas fa-users"></i>
            </button>
            <div class="team-panel" id="teamPanel">
              <div class="team-panel__hdr">
                <span class="team-panel__title"><i class="fas fa-users"></i> Team <span class="team-panel__count" id="teamPanelCount"></span></span>
                <button class="team-panel__close" id="teamPanelClose"><i class="fas fa-times"></i></button>
              </div>
              <div class="team-panel__search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="teamSearch" placeholder="Search users…" autocomplete="off">
              </div>
              <div class="team-panel__body" id="teamPanelBody">
                <!-- injected by renderTeamPanel() -->
              </div>
              <div class="team-panel__footer">
                <div class="team-panel__add-row">
                  <input type="email" id="participantEmail" placeholder="Add member by email…" autocomplete="off">
                  <button id="participantAddConfirm" title="Add member"><i class="fas fa-user-plus"></i></button>
                </div>
                <p class="team-panel__msg" id="participantMsg"></p>
              </div>
            </div>
          </div>
  
        </div>

        <!-- Right group -->
        <div class="topbar-right">
          <div class="topbar-search" id="topbarSearch">
            <button class="topbar-search__icon-btn" id="searchToggle" title="Search"><i class="fas fa-search"></i></button>
            <input type="text" id="boardSearch" placeholder="Search cards&hellip;" autocomplete="off">
            <button class="topbar-search__clear" id="searchClear" title="Clear"><i class="fas fa-times"></i></button>
          </div>
           <div class="topbar-divider"></div>

          <button class="topbar-icon-btn" id="insightsBtn" title="Board Insights (AI)"><i class="fas fa-lightbulb"></i></button>
          <button class="topbar-icon-btn" id="calendarBtn" title="Calendar View"><i class="fas fa-calendar-alt"></i></button>
          <button class="topbar-icon-btn" id="archiveBtn" title="Archive"><i class="fas fa-archive"></i></button>
          <button class="topbar-icon-btn" id="activityToggle" title="Activity"><i class="fas fa-stream"></i></button>

          <div class="topbar-divider"></div>

          <!-- User dropdown -->
          <div class="topbar-user" id="topbarUser">
            <div class="topbar-user__trigger" id="topbarUserTrigger">
              <div class="topbar-avatar-wrap">
                <div class="nav-user__avatar" id="navAvatar"><i class="fas fa-user"></i></div>
              </div>
            </div>
            <div class="topbar-user__dropdown" id="topbarUserDropdown">
              <div class="topbar-user__header">
                <div class="topbar-user__hd-avatar">
                  <div class="nav-user__avatar nav-user__avatar--lg" id="navAvatarDrop"><i class="fas fa-user"></i></div>
                </div>
                <div class="topbar-user__hd-info">
                  <div class="topbar-user__hd-name" id="navUserName">Guest</div>
                  <div class="topbar-user__hd-email" id="navUserEmail"></div>
                </div>
              </div>
              <div class="topbar-user__divider"></div>
              <button class="topbar-user__item" id="profileBtn"><i class="fas fa-user-circle"></i> My Profile</button>
              <button class="topbar-user__item" id="settingsBtn"><i class="fas fa-cog"></i> Settings</button>
              <div class="topbar-user__divider"></div>
              <div class="topbar-user__view-section">
                <div class="topbar-user__view-label"><i class="fas fa-th-large"></i> View</div>
                <div class="topbar-user__view-options" id="profileViewOptions">
                  <button class="topbar-user__view-opt" data-view="tight" title="Tight"><i class="fas fa-compress"></i><span>Tight</span></button>
                  <button class="topbar-user__view-opt" data-view="compact" title="Compact"><i class="fas fa-minus"></i><span>Compact</span></button>
                  <button class="topbar-user__view-opt" data-view="cozy" title="Cozy"><i class="fas fa-align-left"></i><span>Cozy</span></button>
                  <button class="topbar-user__view-opt" data-view="roomy" title="Roomy"><i class="fas fa-expand-alt"></i><span>Roomy</span></button>
                </div>
              </div>
              <div class="topbar-user__divider"></div>
              <button class="topbar-user__item" id="themeToggleBtn"><i class="fas fa-moon" id="themeToggleIcon"></i> <span id="themeToggleLabel">Dark mode</span></button>
              <button class="topbar-user__item" id="fullscreenBtn"><i class="fas fa-expand" id="fullscreenIcon"></i> <span id="fullscreenLabel">Full screen</span></button>
              <div class="topbar-user__divider"></div>
              <button class="topbar-user__item danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
            </div>
          </div>
        </div>
      </div>

      <div class="app">
        <main class="project">
          <div class="project-tasks"></div>
        </main>
        <aside class="task-details collapsed" id="activityPanel">
          <div class="insights-panel__header">
            <span class="insights-panel__title"><i class="fas fa-stream"></i> Activity</span>
            <div class="insights-panel__header-actions">
              <button class="insights-panel__action-btn activity-clear-btn" id="activityClearBtn" title="Clear all logs"><i class="fas fa-trash-alt"></i></button>
              <button class="insights-panel__action-btn" id="activityPanelClose" title="Close"><i class="fas fa-times"></i></button>
            </div>
          </div>
          <div class="insights-panel__body">
          <div class="task-activity">
            <div class="activity-header">
              <div class="activity-tabs-wrap">
                <div class="activity-period-tabs" id="activityPeriodTabs">
                  <button class="activity-period-tab active" data-period="today">Today</button>
                  <button class="activity-period-tab" data-period="week">Week</button>
                  <button class="activity-period-tab" data-period="month">Month</button>
                  <button class="activity-period-tab" data-period="all">All</button>
                  <button class="activity-period-tab activity-period-tab--custom" data-period="custom" id="customPeriodTab"><i class="fas fa-calendar-alt"></i> Custom</button>
                </div>
                <div class="activity-calendar-popover" id="activityCalendarWrap" style="display:none;">
                  <p class="cal-hint">Select a start and end date</p>
                  <div id="activityCalendar"></div>
                </div>
              </div>
            </div>
            <ul id="activityFeed"></ul>
          </div>
          </div>
        </aside>
      </div>
    </div>

    <div class="save-toast" id="saveToast"></div>

    <!-- AI Board Insights panel -->
    <div class="insights-panel" id="insightsPanel">
      <div class="insights-panel__header">
        <span class="insights-panel__title"><i class="fas fa-lightbulb"></i> Board Insights</span>
        <div class="insights-panel__header-actions">
          <button class="insights-panel__action-btn" id="insightsPanelRefresh" title="Regenerate insights"><i class="fas fa-sync-alt"></i></button>
          <button class="insights-panel__action-btn" id="insightsPanelClose" title="Close"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <div class="insights-panel__body" id="insightsPanelBody">
      </div>
    </div>

    <button class="fab" id="fabBtn" title="Add card (Enter)"><i class="fas fa-plus"></i></button>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-wrapper">
        <div class="modal">
          <div class="modal__header">
            <div class="modal__header-brand">
              <h3 id="modalTitle">Add New Card</h3>
            </div>
            <div class="modal__header-bar"></div>
          </div>
          <div class="modal__body">
            <div class="modal-two-col">
              <div class="modal-field">
                <label>Column</label>
                <div class="col-combo" id="colCombo">
                  <button type="button" class="col-combo__trigger" id="colComboTrigger">
                    <span id="colComboLabel">Select column</span>
                    <i class="fas fa-chevron-down col-combo__chevron"></i>
                  </button>
                  <div class="col-combo__menu" id="colComboMenu">
                    <div id="colComboList"></div>
                    <div class="board-combo__footer">
                      <input type="text" class="board-combo__new-input" id="colNewInput" placeholder="New column…" autocomplete="off">
                      <button type="button" class="board-combo__new-add" id="colNewAdd" title="Add column"><i class="fas fa-plus"></i></button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="modal-field">
                <label>Tag</label>
                <div id="cardTag"></div>
              </div>
            </div>
            <div class="modal-field">
              <div class="modal-field__label-row">
                <label for="cardTitle">Title</label>
                <button type="button" class="ai-assist-btn" id="aiTitleBtn" title="Generate headline with AI">
                  <i class="fas fa-magic"></i>
                </button>
              </div>
              <div class="ai-field-wrap">
                <input type="text" id="cardTitle" placeholder="Short card title…" autocomplete="off">
              </div>
            </div>
            <div class="modal-field">
              <div class="modal-field__label-row">
                <label for="cardText">Description</label>
                <button type="button" class="ai-assist-btn" id="aiDescBtn" title="Summarize with AI">
                  <i class="fas fa-magic"></i>
                </button>
              </div>
              <div class="ai-field-wrap">
                <textarea id="cardText" placeholder="Description (optional)…"></textarea>
              </div>
            </div>
            <button type="button" class="modal-more-toggle" id="modalMoreToggle">
              <i class="fas fa-chevron-down modal-more-toggle__icon"></i> More Options
            </button>
            <div class="modal-more-fields" id="modalMoreFields">
              <div class="modal-field">
                <label>To-Do</label>
                <div class="modal-todo-wrap" id="cardTodoWrap">
                  <div class="modal-todo-list" id="cardTodoList"></div>
                  <div class="modal-todo-input-row">
                    <input type="text" id="cardTodoInput" class="modal-todo-input" placeholder="Add a to-do item…">
                    <button type="button" id="cardTodoAdd" class="modal-todo-add-btn"><i class="fas fa-plus"></i></button>
                  </div>
                </div>
              </div>
              <div class="modal-field">
                <label>Assignee</label>
                <div class="col-combo" id="assigneeCombo">
                  <button type="button" class="col-combo__trigger" id="assigneeComboTrigger">
                    <span id="assigneeComboLabel" class="assignee-placeholder">Unassigned</span>
                    <i class="fas fa-chevron-down col-combo__chevron"></i>
                  </button>
                  <div class="col-combo__menu" id="assigneeComboMenu"></div>
                </div>
              </div>
              <div class="modal-field modal-field--row">
                <div class="modal-field modal-field--half">
                  <label for="cardStartDate"><i class="fas fa-play-circle" style="font-size:10px;opacity:.6;margin-right:3px"></i>Start Date</label>
                  <input type="text" id="cardStartDate" placeholder="Select start…" readonly autocomplete="off">
                </div>
                <div class="modal-field modal-field--half">
                  <label for="cardDeadline"><i class="fas fa-flag" style="font-size:10px;opacity:.6;margin-right:3px"></i>Deadline</label>
                  <input type="text" id="cardDeadline" placeholder="Select deadline…" readonly autocomplete="off">
                </div>
              </div>
              <div class="modal-field modal-field--row">
                <div class="modal-field modal-field--half" style="flex:1">
                  <label for="cardLink">Link</label>
                  <input type="url" id="cardLink" placeholder="https://…">
                </div>
              </div>
            </div>
          </div>
          <div class="modal__actions">
            <button class="btn-cancel" id="modalCancel">Cancel</button>
            <button class="btn-add"    id="modalAdd"><i class="fas fa-plus"></i> Add Card</button>
          </div>

    </div><!-- /.modal-overlay -->

  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-card__logo">
        <img class="logo-mode-light" src="images/logo-light.svg" width="160" height="42" alt="Taskbz logo">
        <img class="logo-mode-dark"  src="images/logo-dark.svg"  width="160" height="42" alt="Taskbz logo">

      <h2>Clarity in Simplicity</h2>

        Sign in with Google

      <button class="btn-microsoft" id="btnMicrosoftSignIn">

        Sign in with Microsoft

      <!-- Divider -->

      <!-- Sign-in form -->

        </form>
        <p class="login-switch">No account? <button class="login-switch__btn" id="showRegister">Register</button></p>
      </div>

      <!-- Register form (hidden by default) -->

        <form id="registerFormEl" onsubmit="return false;">
          <input type="email"    id="regEmail"           class="login-input" placeholder="Email address" autocomplete="email">
          <input type="text"     id="regDisplayName"     class="login-input" placeholder="Display name">
          <input type="password" id="regPassword"        class="login-input" placeholder="Password (min 6 chars)" autocomplete="new-password">
          <input type="password" id="regPasswordConfirm" class="login-input" placeholder="Confirm password" autocomplete="new-password">

        <div class="cal-modal__header-bar"></div>
      </div>

          </div>
          <div class="cal-sidebar__list" id="calSidebarList"></div>

        <div id="fcContainer"></div>

    </div>
  </div>

  <script src="js/app.js"></script>

  <script src="js/modal.js"></script>
  <script src="js/ai-assist.js"></script>
  <script src="js/ai-insights.js"></script>
  <script src="js/confetti.js"></script>
  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="js/calendar.js"></script>
  <script>
  (function () {
    const STORAGE_KEY = 'qnotes_view';

    window.applyView = function(view, persist) {
      if (persist === undefined) persist = true;
      document.body.classList.remove('view-tight', 'view-cozy', 'view-roomy');
      if (['tight', 'cozy', 'roomy'].includes(view)) document.body.classList.add('view-' + view);
      document.querySelectorAll('.topbar-user__view-opt').forEach(el => {
        el.classList.toggle('active', el.dataset.view === view);
      });
      localStorage.setItem(STORAGE_KEY, view);
      if (persist && window.saveViewPreference) window.saveViewPreference(view);
    };

    // Restore saved preference (no Firestore write on initial load)
    window.applyView(localStorage.getItem(STORAGE_KEY) || 'cozy', false);

    document.getElementById('profileViewOptions').addEventListener('click', e => {
      const opt = e.target.closest('.topbar-user__view-opt');
      if (!opt) return;
      window.applyView(opt.dataset.view);
    });

    // Handle invite URL params — pre-fill register form with invited email
    (function() {
      const params = new URLSearchParams(window.location.search);
      const inviteEmail = params.get('invite');
      const inviteBoard = params.get('board');
      const inviteName  = params.get('bname');
      if (!inviteEmail) return;
      const regEmail     = document.getElementById('regEmail');
      const loginForm    = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const banner       = document.getElementById('inviteBanner');
      const tagline      = document.getElementById('loginTagline');
      if (regEmail)     regEmail.value = decodeURIComponent(inviteEmail);
      if (loginForm)    loginForm.style.display = 'none';
      if (registerForm) registerForm.style.display = '';
      if (tagline)      tagline.textContent = "You've been invited! Create an account to get started.";
      if (banner) {
        banner.style.display = '';
        banner.innerHTML = inviteName
          ? `<i class='fas fa-envelope-open-text'></i> You've been invited to join <b>${inviteName}</b>`
          : `<i class='fas fa-envelope-open-text'></i> You have a board invitation waiting`;
      }
      if (inviteBoard) sessionStorage.setItem('pendingInviteBoard', decodeURIComponent(inviteBoard));
    })();
  })();
  </script>

</body>
